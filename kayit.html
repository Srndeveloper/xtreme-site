<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Kayit</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                    <img src="logo.jpeg" alt="logo" width="40" height="40">Xtreme Doğa Sporlari</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.hmtl">Ana Sayfa</a></li>
                        <li class="nav-item"><a class="nav-link" href="hakkimizda.hmtl">Hakkimizda</a></li>
                        <li class="nav-item"><a class="nav-link" href="trips.hmtl">Geziler</a></li>
                        <li class="nav-item"><a class="nav-link" href="kayit.hmtl">Kayit</a></li>
                        <li class="nav-item"><a class="nav-link" href="iletisim.hmtl">İletisim</a></li>
                        
                    </ul>
                     <select class="form-select w-auto ms-3">
                        <option>TR</option>
                        <option>EN</option>
                    </select>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <h1>Kayit Ol</h1>
            <form id="register-form">
                <input class="form-control mb-2" type="text" id="name" placeholder="Ad Soyad" required>
                <input class="form-control mb-2" type="email" id="email" placeholder="Email" required>
                <input class="form-control mb-2" type="tel" id="phone" placeholder="Telefon" required>
                <select class="form-control mb-2" id="trip-select" required>
                    <option value="">Gezi Seciniz</option>
                </select>
                <button class="btn btn-success">Kayit Ol</button>

            </form>
            <p id="message" class="mt-3"></p>
        </div>
        <script>
            const trips=JSON.parse(localStorage.getItem('trips')) || [];
            const select=document.getElementById('trip-select');
            trips.forEach(trip=> {
                const option=document.createElement('option');
                option.value=trip.name;
                option.textContent=trip.name+"-"+trip.date;
                select.appendChild(option);
            });
            document.getElementById('register-form').addEventListener('submit', e => {
                e.preventDefault();
                const data={
                    name:name.value,
                    email:email.value,
                    phone:phone.value,
                    trip:select.value

                };
                let list=JSON.parse(localStorage.getItem('kayitlar')) || [];
                list.push(data);
                localStorage.setItem('kayitlar', JSON.stringify(list));
                document.getElementById('message').innerText="Kayit Basarili!";
            });

        </script>
    </body>
</html>
