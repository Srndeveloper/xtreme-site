<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Geziler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                    <img src="logo.jpeg" width="40">Xtreme
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link " href="index.html">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link " href="hakkimizda.html">Hakkimizda</a></li>
                    <li class="nav-item"><a class="nav-link active" href="trips.html">Geziler</a></li>
                    <li class="nav-item"><a class="nav-link " href="kayit.html">Kayit</a></li>
                    <li class="nav-item"><a class="nav-link " href="iletisim.html">Iletisim</a></li>
                </ul>
                 <select class="form-select w-auto ms-3">
                        <option>TR</option>
                        <option>EN</option>
                    </select>
            </div>
            </div>
        </nav>  
    </header>
    <section class="hero">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <div class="hero-text">Geziler</div>
    </section>
    <div class="text-center my-4">
        <button class="btn btn-warning m-1" onclick="filterTrips('all')">Tümü</button>
        <button class="btn btn-outline-warning m-1" onclick="filterTrips('dag')">Dağ</button>
        <button class="btn btn-outline-warning m-1" onclick="filterTrips('kamp')">Kamp</button>
    </div>
   
    <section class="container mb-5">
        <h2 class="text-center mb-4">Yeni Gezi Ekle</h2>
    <form id="add-trip-form" class="row g-3 justify-content-center">
        <div class="col-md-3">
        <input type="text" id="trip-name" class="form-control" placeholder="Gezi Adi" required></div>
        <div class="col-md-3">
        <input type="text" id="trip-date" class="form-control" placeholder="Tarih" required></div>
        <div class="col-md-3">
        <input type="file" id="trip-img" class="form-control" accept="image/*" multiple required></div>
        <div class="col-md-2">
        <select id="trip-type" class="form-select" required>
        <option value="dag">Dag</option>
        <option value="kamp">Kamp</option>
    </select>
    </div>
    <div class="col-md-2">
        <button class="btn btn-warning w-100">Ekle</button>
    </div>
        
    </form>
    </section>
    <section class="container">
        <div class="row" id="trips-container"></div>

    </section>
    
    <footer class="bg-dark text-white text-center p-3 mt-4">
    &copy; 2026 Xtreme Doğa Sporları
</footer>

<script src="trips.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
